  - mcp_tools
  - shell_access
  - git_ops
  - github_cli
  - subagents
  - parallel_teams
  - web_search
  - session_memory
  - notifications
  - async_tasks
updated_at: "2026-02-16T20:00:00Z"   # ISO 8601 UTC — updated on every status change
